sentence=A library for algorithmic typography animations — wave functions, per-glyph physics, live UI controls, and audio reactivity.
paragraph=AlgorithmicTypography gives graphic designers and typographers a powerful toolkit for parametric type systems in Processing. Animated grids of glyphs are driven by mathematical wave functions and a growing suite of per-cell motion engines (Circular, Perlin, Lissajous, Spring, Gravity, Magnetic, Ripple, FlowField, Orbital, GridStripMotion). v0.3.0 introduces Typography as Material: GlyphCurvatureField modulates wave amplitude from letterform curvature; CounterpointEngine drives outer forms and counter-forms (holes) on independent rhythms; Optical Rhythm Sync derives waveSpeed from typeface geometry automatically; Word/Sentence Mode fills the grid with successive characters from any string. The GlyphExtractor provides hatch fill, outline offset, character morphing, medial axis, arc-length sampling, boolean area operations (union/intersect/subtract), path utilities (textOnPath, getTangent, getDashedOutline, subdivide), and a Type DNA fingerprinting system. Includes a live-control UI layer, audio-reactivity, SVG export, WebSocket remote control, and a clean plugin architecture for custom wave functions and motion strategies.
