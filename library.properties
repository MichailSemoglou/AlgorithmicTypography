sentence=A library for algorithmic typography animations — wave functions, per-glyph physics, live UI controls, and audio reactivity.
paragraph=AlgorithmicTypography gives graphic designers and typographers a powerful toolkit for parametric type systems in Processing. Animated grids of glyphs are driven by mathematical wave functions and a growing suite of per-cell motion engines (Circular, Perlin, Lissajous, Spring, Gravity, Magnetic, Ripple, FlowField, Orbital). The GlyphExtractor provides hatch fill, outline offset, character morphing, medial axis, arc-length sampling, and word bounding contours. Includes a live-control UI layer, audio-reactivity, SVG export, WebSocket remote control, and a clean plugin architecture for custom wave functions and motion strategies.
